# Calliope mascot Live2D emotion → expression/motion mapping
# Used by mascot.js (fetch /api/mascot/emotion_map) and generate_scene.py inference
#
# Targets the SHIPPABLE model Mao (models/mao/Mao.model3.json):
#   expressions = exp_01..exp_08 (real Expression Names in the model3.json)
#   motions     = Idle | TapBody  (the only two motion groups Mao declares)
# See frontend/live2d/app.js DEFAULT_EXPRESSIONS for the emotion→slot rationale.

expressions:
  determined: exp_07
  joyful: exp_02
  celebratory: exp_02
  wounded: exp_05
  sorrowful: exp_05
  neutral: exp_01
  angry: exp_07
  fearful: exp_06
  surprised: exp_03
  contemplative: exp_01
  triumphant: exp_02
  defiant: exp_07

motions:
  determined: TapBody
  joyful: TapBody
  celebratory: TapBody
  wounded: Idle
  sorrowful: Idle
  neutral: Idle
  angry: TapBody
  fearful: Idle
  surprised: TapBody
  contemplative: Idle
  triumphant: TapBody
  defiant: TapBody

# Mapping from generate_scene.py scene_type → default emotion
scene_type_emotion:
  action_combat: determined
  dialogue: neutral
  exploration: contemplative
  celebration: joyful
  tragedy: sorrowful
  confrontation: defiant
  victory: triumphant
  injury: wounded
  mystery: contemplative
  romance: joyful

# Default fallback
default_expression: exp_01
default_motion: Idle
